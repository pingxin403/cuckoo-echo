services:
  # ============================================================
  # Infrastructure Services
  # ============================================================
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cuckoo
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=none"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.6
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # Database Migration (runs once, then exits)
  # ============================================================
  migrate:
    build:
      context: .
      dockerfile: k8s/Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # Application Services
  # ============================================================
  api-gateway:
    build:
      context: .
      dockerfile: k8s/Dockerfile
    command: ["granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "8000", "api_gateway.main:app"]
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  chat-service:
    build:
      context: .
      dockerfile: k8s/Dockerfile
    command: ["granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "8001", "chat_service.main:app"]
    ports:
      - "8001:8001"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin-service:
    build:
      context: .
      dockerfile: k8s/Dockerfile
    command: ["granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "8002", "admin_service.main:app"]
    ports:
      - "8002:8002"
    env_file: .env.docker
    volumes:
      - uploads:/tmp/cuckoo-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  knowledge-pipeline:
    build:
      context: .
      dockerfile: k8s/Dockerfile
    command: ["python", "-m", "knowledge_pipeline.worker"]
    env_file: .env.docker
    volumes:
      - uploads:/tmp/cuckoo-uploads
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ============================================================
  # Frontend Service
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started
      admin-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # Milvus Collection Initialization (runs once)
  # ============================================================
  init-milvus:
    build:
      context: .
      dockerfile: scripts/Dockerfile.seed
    command: ["python", "-m", "scripts.init_milvus"]
    env_file: .env.docker
    depends_on:
      milvus:
        condition: service_healthy

  # ============================================================
  # Seed Script (runs once, creates test data)
  # ============================================================
  seed:
    build:
      context: .
      dockerfile: scripts/Dockerfile.seed
    env_file: .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  milvusdata:
  miniodata:
  uploads:
