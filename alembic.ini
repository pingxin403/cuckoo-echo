# Alembic Configuration File

[alembic]
# path to migration environment
script_location = migrations/alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path prepend - project root so imports work
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .hierarchical_revision_ids to be used
# hierarchical_revision_ids = false

# The database URL is read from the DATABASE_URL environment variable
# via pydantic-settings in env.py. This value is overridden at runtime.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/cuckoo

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
