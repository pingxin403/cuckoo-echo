# Cuckoo-Echo Ingress — Nginx Ingress Controller + cert-manager TLS
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.1/deploy/static/provider/cloud/deploy.yaml
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.1/cert-manager.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cuckoo-echo-ingress
  namespace: cuckoo-echo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "210m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE: disable buffering for streaming endpoints
    nginx.ingress.kubernetes.io/server-snippet: |
      location /v1/chat/completions {
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
      }
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # TLS via cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cuckoo-echo.example.com
      secretName: cuckoo-echo-tls
  rules:
    - host: cuckoo-echo.example.com
      http:
        paths:
          # Frontend static files
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Chat SSE + WS (direct to chat-service)
          - path: /v1/chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8001
          # Thread history (chat-service)
          - path: /v1/threads
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8001
          # C-side REST API (api-gateway)
          - path: /v1/
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # Admin API
          - path: /admin/v1/
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 8002
---
# cert-manager ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com  # CHANGE THIS
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
