# Cuckoo-Echo K8s Secrets Template
# Copy to secrets.yaml and fill in real values before applying:
#   cp secrets.example.yaml secrets.yaml
#   # Edit secrets.yaml with real values
#   kubectl apply -f secrets.yaml
#
# IMPORTANT: Never commit secrets.yaml to git!
apiVersion: v1
kind: Secret
metadata:
  name: cuckoo-echo-secrets
  namespace: cuckoo-echo
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://cuckoo:CHANGE_ME@postgres:5432/cuckoo"
  DATABASE_RO_URL: ""

  # Redis
  REDIS_URL: "redis://redis:6379/0"

  # LLM API
  LLM_API_KEY: "sk-CHANGE_ME"
  LLM_API_BASE: ""
  LLM_PRIMARY_MODEL: "deepseek-chat"
  LLM_FALLBACK_MODEL: "qwen-plus"

  # Admin JWT
  ADMIN_JWT_SECRET: "CHANGE_ME_TO_RANDOM_64_CHARS"

  # MinIO / OSS
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"

  # Langfuse (optional)
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
